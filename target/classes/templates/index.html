<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
<meta charset="UTF-8">
<title>Movies</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<span th:replace="fragment_navbar :: navBar"></span>
<div class="header">
<h1>🎬 Movie Catalog</h1>
    <a th:href="@{/createMovie}" class="btn">Nueva película</a>
</div>

<div class="search-bar">
    <form th:action="@{/searchMovie}" method="post">
        <input type="text" placeholder="Buscar por título..." name="searchTitle">
            <select name="searchGenre">
                <option value="0">Todos los géneros</option>
                <option th:each="genre : ${genres}"
                        th:value="${genre.getId()}"
                        th:text="${genre.getName()}">
                </option>
            </select>

        <button class="btn">Buscar</button>
        <div id="counter" th:text="${movies.size()}"></div>
    </form>
</div>

<div class="movie-grid">
    <div class="movie-card" th:each="movie : ${movies}">
        <a th:href="@{/movie-detail/{id}(id=${movie.id})}">
            <img th:src="${movie.urlThumbnail}" th:alt="${movie.title}">
        </a>
        <div class="movie-info">
            <h3 th:text="${movie.title}"></h3>
            <!--<div class="genre" th:text="${movie.genre}"></div>-->
        </div>
    </div>



</div>

</body>
</html>
