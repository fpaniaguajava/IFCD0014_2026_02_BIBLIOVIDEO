<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva Película</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
<span th:replace="fragment_navbar :: navBar"></span>

<h1>Alta de Película</h1>

<div class="form-container">

    <form th:action="@{/movie/create}" th:object="${movie}" method="post">

        <div class="form-group">
            <label>Título</label>
            <input type="text" th:field="*{title}" required>
        </div>

        <div class="form-group">
            <label>Thumbnail URL</label>
            <input type="text" th:field="*{urlThumbnail}">
        </div>

        <div class="form-group">
            <label>Video URL</label>
            <input type="text" th:field="*{urlVideo}">
        </div>

        <div class="form-group">
            <label>Género</label>
            <select name="genre">
                <option th:each="genre : ${genres}"
                        th:value="${genre.getId()}"
                        th:text="${genre.getName()}">
                </option>
            </select>
        </div>

        <button class="btn" type="submit">Guardar</button>

    </form>

</div>
